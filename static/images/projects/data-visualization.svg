    <rect x="240" y="180" width="50" height="180" rx="3"/>
    <rect x="320" y="270" width="50" height="90" rx="3"/>
    <rect x="400" y="140" width="50" height="220" rx="3"/>
    <rect x="480" y="220" width="50" height="140" rx="3"/>
