<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Data Visualization">
  <rect width="800" height="500" fill="#0f172a"/>
  <g stroke="#94a3b8" stroke-width="1.25" fill="none" opacity="0.18">
    <path d="M0 100 H800 M0 200 H800 M0 300 H800 M0 400 H800"/>
    <path d="M100 0 V500 M200 0 V500 M300 0 V500 M400 0 V500 M500 0 V500 M600 0 V500 M700 0 V500"/>
